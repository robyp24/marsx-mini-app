<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarsX Rocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 5s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            display: none; /* Изначально скрыт, покажем через JS */
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 900;
            color: #ff4d4d;
            margin: 0;
        }
        .status-bar {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid #ff4d4d;
            border-radius: 10px;
            padding: 10px 20px;
            margin-top: 10px;
            font-size: 14px;
        }

        .game-area {
            width: 100%;
            max-width: 350px;
            height: 400px;
            position: relative;
            background: url('https://i.imgur.com/gKpKz1l.gif') no-repeat center center;
            background-size: contain;
        }
        .rocket {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            transition: all 2s ease-in-out;
        }
        .rocket.in-flight {
            bottom: 350px;
            opacity: 0;
        }

        .planets {
            width: 100%;
            max-width: 400px;
        }
        .planet {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease, transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .planet:hover {
            background-color: rgba(255, 77, 77, 0.2);
            transform: scale(1.05);
        }
        .planet:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .planet-info {
            text-align: left;
        }
        .planet-name {
            font-size: 18px;
            font-weight: bold;
        }
        .planet-stats {
            font-size: 12px;
            color: #bbbbbb;
        }
        .planet-icon {
            font-size: 30px;
        }
        
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 20px 30px;
            border-radius: 10px;
            border: 2px solid #ff4d4d;
            text-align: center;
            z-index: 1000;
            display: none;
        }
        .notification.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="header">
            <h1>🚀 MarsX Rocket</h1>
            <div id="status" class="status-bar">
                <p>Загрузка данных...</p>
            </div>
        </div>

        <div class="game-area">
            <div id="rocket" class="rocket">🚀</div>
        </div>

        <div id="planets" class="planets">
            <!-- Кнопки планет будут вставлены сюда JS -->
        </div>
    </div>

    <div id="notification" class="notification">
        <p id="notification-text"></p>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>

</body>
</html>
