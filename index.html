<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarsX Rocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 5s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex; /* Изменено с none на flex */
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 900;
            color: #ff4d4d;
            margin: 0;
        }
        .status-bar {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid #ff4d4d;
            border-radius: 10px;
            padding: 10px 20px;
            margin-top: 10px;
            font-size: 14px;
        }
        .invest-button {
            background-color: #FFD700;
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .invest-button:hover {
            background-color: #FFC700;
        }

        .game-area {
            width: 100%;
            max-width: 350px;
            height: 400px;
            position: relative;
            background: url('https://i.imgur.com/gKpKz1l.gif') no-repeat center center;
            background-size: contain;
        }
        .rocket {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            transition: all 2s ease-in-out;
        }
        .rocket.in-flight {
            bottom: 350px;
            opacity: 0;
        }

        .planets {
            width: 100%;
            max-width: 400px;
        }
        .planet {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease, transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .planet:hover {
            background-color: rgba(255, 77, 77, 0.2);
            transform: scale(1.05);
        }
        .planet:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .planet-info {
            text-align: left;
        }
        .planet-name {
            font-size: 18px;
            font-weight: bold;
        }
        .planet-stats {
            font-size: 12px;
            color: #bbbbbb;
        }
        .planet-icon {
            font-size: 30px;
        }
        
        /* --- Стили для инвестиций --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            padding: 20px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: #fff;
            overflow-y: auto;
        }
        .screen-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .screen-header h2 {
            font-size: 22px;
            font-weight: 900;
            color: #FFD700; /* Золотой цвет */
        }
        .investment-options {
            width: 100%;
            max-width: 400px;
        }
        .investment-card {
            background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
            border: 1px solid #444;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .investment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
            border-color: #FFD700;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 16px;
            font-weight: bold;
        }
        .card-price {
            font-size: 18px;
            font-weight: 900;
            color: #FFD700;
        }
        .card-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .card-gc {
            color: #fff;
        }
        .card-income {
            color: #00ff00; /* Зеленый цвет для дохода */
        }
        .back-button {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="header">
            <h1>🚀 MarsX Rocket</h1>
            <div id="status" class="status-bar">
                <p>Загрузка данных...</p>
            </div>
            <button id="go-to-invest" class="invest-button">💰 Инвестировать</button>
        </div>

        <div class="game-area">
            <div id="rocket" class="rocket">🚀</div>
        </div>

        <div id="planets" class="planets">
            <!-- Кнопки планет будут вставлены сюда JS -->
        </div>
    </div>

    <!-- Новый экран для инвестиций -->
    <div id="investment-screen" class="screen">
        <div class="screen-header">
            <h2>🚀 Инвестиции в MarsX</h2>
            <p>Увеличьте свой пассивный доход и станьте лидером!</p>
        </div>
        <div class="investment-options">
            <div class="investment-card" data-amount="5">
                <div class="card-header">
                    <span class="card-title">Стартовый пакет</span>
                    <span class="card-price">$5</span>
                </div>
                <div class="card-body">
                    <span class="card-gc">+500 GC</span>
                    <span class="card-income">+0.15 GC/мин</span>
                </div>
            </div>
            <div class="investment-card" data-amount="10">
                <div class="card-header">
                    <span class="card-title">Бизнес-класс</span>
                    <span class="card-price">$10</span>
                </div>
                <div class="card-body">
                    <span class="card-gc">+1000 GC</span>
                    <span class="card-income">+0.30 GC/мин</span>
                </div>
            </div>
            <div class="investment-card" data-amount="25">
                <div class="card-header">
                    <span class="card-title">ВИП-пакет</span>
                    <span class="card-price">$25</span>
                </div>
                <div class="card-body">
                    <span class="card-gc">+2500 GC</span>
                    <span class="card-income">+0.75 GC/мин</span>
                </div>
            </div>
            <div class="investment-card" data-amount="50">
                <div class="card-header">
                    <span class="card-title">Alpha Colonist</span>
                    <span class="card-price">$50</span>
                </div>
                <div class="card-body">
                    <span class="card-gc">+5000 GC</span>
                    <span class="card-income">+1.50 GC/мин</span>
                </div>
            </div>
        </div>
        <button id="back-to-main-from-invest" class="back-button">← Назад</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>

</body>
</html>
